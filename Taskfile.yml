version: "3"

vars:
  WORKER_BIN: ./bin/worker
  BACKEND_BIN: ./bin/backend

tasks:
  dev:
    desc: Run the backend with hot reload (requires Air)
    cmds: ["air"]

  build:
    desc: Build the worker and backend binaries
    cmds:
      - >-
        CGO_ENABLED=0 go build -trimpath -ldflags="-s -w"
        -o {{.WORKER_BIN}} ./cmd/worker
      - >-
        CGO_ENABLED=0 go build -trimpath -ldflags="-s -w"
        -o {{.BACKEND_BIN}} ./cmd/backend

  run-worker:
    desc: Run the worker
    cmds: ["go run ./cmd/worker"]

  run-backend:
    desc: Run the backend
    cmds: ["go run ./cmd/backend"]

  test:
    desc: Run tests
    cmds: ["go test -race -shuffle=on ./..."]

  lint:
    desc: Run golangci-lint (requires golangci-lint v2)
    cmds: ["golangci-lint run"]

  format:
    desc: Format code (gofumpt + goimports)
    cmds:
      - go run mvdan.cc/gofumpt@latest -l -w .
      - go run golang.org/x/tools/cmd/goimports@latest -w .

  tidy:
    desc: Tidy and verify module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  check:
    desc: Run all checks
    deps: [lint, test]
