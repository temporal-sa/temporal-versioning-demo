# Pizza Tracker backend: polls Temporal, streams dashboard state over SSE,
# generates orders, drives routing/recovery actions, and serves the SPA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-backend
  labels:
    app: pizza-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-backend
  template:
    metadata:
      labels:
        app: pizza-backend
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/alexandreroman/temporal-versioning-demo-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: PIZZA_DEPLOYMENT_NAME
              value: pizza
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-backend
spec:
  selector:
    app: pizza-backend
  ports:
    - name: http
      port: 80
      targetPort: http
