# Pizza Tracker backend: polls Temporal, streams dashboard state over SSE,
# generates orders, drives routing/recovery actions, and serves the SPA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-backend
  labels:
    app: pizza-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-backend
  template:
    metadata:
      labels:
        app: pizza-backend
    spec:
      securityContext:
        runAsNonRoot: true
        # Distroless nonroot UID/GID; required so the kubelet can verify
        # non-root (the image's `nonroot` user is non-numeric).
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/alexandreroman/temporal-versioning-demo-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PIZZA_DEPLOYMENT_NAME
              # The Worker Controller names the deployment <namespace>/<name>.
              # Compose it from the pod's own namespace (Downward API) so no
              # namespace is hardcoded; only the WorkerDeployment name (pizza)
              # is fixed. Kubernetes expands $(POD_NAMESPACE) because it is
              # defined earlier in this list.
              value: $(POD_NAMESPACE)/pizza
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-backend
spec:
  selector:
    app: pizza-backend
  ports:
    - name: http
      port: 80
      targetPort: http
