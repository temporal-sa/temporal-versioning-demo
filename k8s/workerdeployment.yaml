# Versioned pizza worker, managed by the Temporal Worker Controller.
# Manual strategy: new versions stay Inactive until the UI promotes/ramps them.
# Ship a new version by changing PIZZA_VERSION (and the image tag) in this pod
# template — the controller derives a new Build ID from the pod-template hash.
apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: pizza-worker
spec:
  replicas: 1
  workerOptions:
    connectionRef:
      name: pizza-temporal
    temporalNamespace: default
  rollout:
    strategy: Manual
  sunset:
    # A drained version's pods stay up this long, so you can still roll
    # back to it (rollback routes to a live worker only while it exists).
    scaledownDelay: 30m
    # Keep the drained version registered/visible before final removal.
    deleteDelay: 2h
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        # Distroless nonroot UID/GID; required so the kubelet can verify
        # non-root (the image's `nonroot` user is non-numeric).
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/alexandreroman/temporal-versioning-demo-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            # The version shape this pod runs. Bump to v2/v3 to ship a new version.
            - name: PIZZA_VERSION
              value: v1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          # Controller auto-injects TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE,
          # TEMPORAL_DEPLOYMENT_NAME, TEMPORAL_WORKER_BUILD_ID.
