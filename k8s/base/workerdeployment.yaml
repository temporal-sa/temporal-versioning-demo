# Versioned pizza worker, managed by the Temporal Worker Controller.
# Manual strategy: new versions stay Inactive until the UI promotes/ramps them.
# Ship a new version by changing the image TAG to :v2/:v3 in this pod template —
# the controller derives a new Build ID from the pod-template hash.
apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: pizza-worker
spec:
  replicas: 1
  workerOptions:
    connectionRef:
      name: pizza-temporal
    temporalNamespace: default
  rollout:
    # Manual: new versions stay Inactive; you drive ramp / promote / rollback
    # by hand from the dashboard. This is what the demo uses.
    strategy: Manual
    # Progressive (production-style): let the controller automate the rollout
    # instead of the UI. Swap `strategy: Manual` above for `strategy:
    # Progressive` and add a `steps:` schedule — the controller raises the
    # ramping percentage to each step, waits `pauseDuration`, then advances,
    # promoting the version to Current after the final step. For example:
    #
    #   strategy: Progressive
    #   steps:                     # up to 20 steps
    #     - rampPercentage: 25     # 1-99
    #       pauseDuration: 30s     # minimum 30s
    #     - rampPercentage: 50
    #       pauseDuration: 1m
    #   gate:                      # optional
    #     # A Temporal workflow the controller runs before advancing a step;
    #     # the step proceeds only if it completes successfully (use it to
    #     # smoke-test the new version, check SLOs, etc.).
    #     workflowType: PizzaRolloutGate
    #
    # AllAtOnce is also available (immediate switch to 100%).
  sunset:
    # A drained version's pods stay up this long, so you can still roll
    # back to it (rollback routes to a live worker only while it exists).
    scaledownDelay: 30m
    # Keep the drained version registered/visible before final removal.
    deleteDelay: 2h
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        # Distroless nonroot UID/GID; required so the kubelet can verify
        # non-root (the image's `nonroot` user is non-numeric).
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/alexandreroman/temporal-versioning-demo-worker:v1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          # Controller auto-injects TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE,
          # TEMPORAL_DEPLOYMENT_NAME, TEMPORAL_WORKER_BUILD_ID.
