# Kustomize entry point for the Pizza Tracker demo.
# Deploy against the running temporal-k8s Kind cluster with:
#
#   make deploy
#
# which pins every image to its digest via kbld before applying:
#
#   kubectl kustomize k8s/base | kbld -f - | kubectl apply -f -
#
# Container images are published to ghcr.io/alexandreroman/<image>.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pizza-tracker

resources:
  - namespace.yaml
  - connection.yaml
  - workerdeployment.yaml
  - backend.yaml
  - httproute.yaml
