name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  # Run JS-based actions on Node 24. GitHub deprecated the Node 20 runtime
  # (default flips 2026-06-16, removed 2026-09-16). Most actions in this
  # workflow are pinned to Node-24 majors; this flag also covers
  # actions/upload-artifact and actions/download-artifact, which have no
  # Node-24 release yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go test -race -shuffle=on ./...

  images:
    name: Build ${{ matrix.target.slug }} (${{ matrix.platform }})
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # The worker is published as three version-tagged images: the active
        # workflow shape is baked at build time via the PIZZA_VERSION build arg,
        # so each tag is a distinct image/digest (hence a distinct Build ID).
        # The backend is a single, unversioned image.
        target:
          - { slug: worker-v1, name: temporal-versioning-demo-worker, dockerfile: Dockerfile.worker, build-args: "PIZZA_VERSION=v1" }
          - { slug: worker-v2, name: temporal-versioning-demo-worker, dockerfile: Dockerfile.worker, build-args: "PIZZA_VERSION=v2" }
          - { slug: worker-v3, name: temporal-versioning-demo-worker, dockerfile: Dockerfile.worker, build-args: "PIZZA_VERSION=v3" }
          - { slug: backend,   name: temporal-versioning-demo-backend, dockerfile: Dockerfile.backend, build-args: "" }
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare platform pair
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          build-args: ${{ matrix.target.build-args }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.target.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target.slug }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.target.slug }}-${{ matrix.platform }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target.slug }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & push ${{ matrix.target.slug }}
    needs: images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # Each worker slug maps to a single immutable version tag; the backend
        # keeps its per-commit sha tag plus the convenience latest tag.
        target:
          - { slug: worker-v1, name: temporal-versioning-demo-worker, tags: "type=raw,value=v1" }
          - { slug: worker-v2, name: temporal-versioning-demo-worker, tags: "type=raw,value=v2" }
          - { slug: worker-v3, name: temporal-versioning-demo-worker, tags: "type=raw,value=v3" }
          - slug: backend
            name: temporal-versioning-demo-backend
            tags: |
              type=sha
              type=raw,value=latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target.slug }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.target.name }}
          tags: ${{ matrix.target.tags }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ matrix.target.name }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.target.name }}:${{ steps.meta.outputs.version }}
