<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza Tracker</title>

    <!-- Inline pizza-slice favicon (same artwork as the header logo) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Cg%20fill=%22%23e8923a%22%20stroke=%22%23f4c542%22%20stroke-width=%221.4%22%20stroke-linejoin=%22round%22%3E%3Cpath%20d=%22M12%2012L20.5%2012A8.5%208.5%200%201%201%2012%203.5Z%22/%3E%3Cpath%20d=%22M14.4%209.6L14.4%201.1A8.5%208.5%200%200%201%2022.9%209.6Z%22/%3E%3C/g%3E%3Cg%20fill=%22%23c0392b%22%3E%3Ccircle%20cx=%2215.5%22%20cy=%2215.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%228.5%22%20cy=%2215.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%228.5%22%20cy=%228.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%2211%22%20cy=%2213.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%2216.8%22%20cy=%227.2%22%20r=%221.05%22/%3E%3Ccircle%20cx=%2215%22%20cy=%229.3%22%20r=%221.05%22/%3E%3C/g%3E%3C/svg%3E"
    />

    <!-- Tailwind CSS v4 (Play CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- HTMX core + SSE and response-targets extensions (current stable 2.x) -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-response-targets@2"></script>
    <!-- Idiomorph htmx extension (pre-1.0 → floating @0); registers the "morph" swap. -->
    <script src="https://cdn.jsdelivr.net/npm/idiomorph@0/dist/idiomorph-ext.min.js"></script>

    <!-- Brand type: Hanken Grotesk (geometric grotesque close to Temporal's Aeonik). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!--
      Single styling source for the app. Everything is expressed with Tailwind
      utilities (via @apply on semantic component classes; the Go templates stay
      dumb and reuse those class names). The theme is Temporal's brand: Space
      Black surfaces, UV (#444CE7) accent, Off White text, Hanken Grotesk type.
      Only what cannot be a utility stays raw CSS: @theme token definitions,
      @keyframes, the prefers-reduced-motion query, and the stepper/cur-node
      pseudo-elements (the progress fill is a calc() driven by live --fill).
    -->
    <style type="text/tailwindcss">
      @theme {
        /* ===== Temporal brand palette =====
           UV / Space Black / Off White from temporal.io/brand, plus a neutral
           dark surface scale. Exposed as color tokens so utilities (bg-*,
           text-*, border-*) and var(--color-*) references both resolve. */
        --color-base: #0e0e11; /* page background */
        --color-surface: #15151a; /* cards, header, dots */
        --color-raised: #1b1b21; /* radios, default buttons */
        --color-edge: #20202a; /* card borders */
        --color-line: #2c2c36; /* default borders, tracks */
        --color-divider: #23232c; /* header + column divider */
        --color-ink: #f8fafc; /* Off White text */

        --color-uv: #444ce7; /* Temporal UV — primary accent, v1 */
        --color-uv-deep: #3a40c4; /* UV pressed/hover */
        --color-green: #16a34a; /* v2 + stepper success fill */
        --color-amber: #d97706; /* v3 + ramping */
        --color-red: #dc2626; /* error */

        /* Brand type: Hanken Grotesk (close to Aeonik), system fallbacks. */
        --font-sans: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        /* Animations (each maps to an animate-* utility). */
        --animate-pulse-dot: pulse 1.5s ease-out infinite;
        --animate-errp: errp 1.2s infinite;
        --animate-card-in: card-in 0.35s ease backwards;
        --animate-card-collapse: card-collapse 0.5s ease 4s forwards;
        --animate-toast-out: toast-out 4s ease forwards;

        @keyframes pulse {
          0% {
            box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.55);
          }
          70% {
            box-shadow: 0 0 0 10px rgba(250, 204, 21, 0);
          }
          100% {
            box-shadow: 0 0 0 0 rgba(250, 204, 21, 0);
          }
        }

        @keyframes errp {
          0% {
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6);
          }
          70% {
            box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);
          }
          100% {
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
          }
        }

        @keyframes toast-out {
          0%,
          90% {
            opacity: 1;
          }
          100% {
            opacity: 0;
          }
        }

        @keyframes card-in {
          from {
            opacity: 0;
            transform: translateY(6px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes card-collapse {
          to {
            max-height: 0;
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
            opacity: 0;
            filter: grayscale(1);
          }
        }
      }

      * {
        @apply box-border;
      }

      html,
      body {
        @apply m-0 h-full;
      }

      body {
        @apply bg-base text-ink font-sans antialiased;
      }

      /* ===== App shell =====
         Full-bleed shell/header; the body is wrapped in a centered max-w-5xl
         column (.dbody). Inner sections supply their own px. */
      .app {
        @apply flex h-dvh flex-col overflow-hidden;
      }

      .top {
        @apply flex shrink-0 items-center gap-3 border-b border-divider bg-surface px-[18px] py-[15px];
      }

      .top .logo {
        @apply flex items-center gap-2 text-[17px] font-extrabold;
      }

      .top .logo .logo-icon {
        @apply shrink-0;
      }

      /* Right-aligned "powered by" caption + Temporal logo lockup. */
      .top .attribution {
        @apply ml-auto flex items-center gap-2 text-[12px] uppercase tracking-wide text-white/55;
      }

      .top .attribution img {
        @apply block h-8 w-auto;
      }

      /* Read-only ramp percentage shown live in the Deploy modal (amber accent). */
      .pct {
        @apply font-extrabold text-amber;
      }

      /* ===== Body: two flex columns =====
         Centered max-w-5xl row: a flexible orders column (.dleft) and a fixed
         360px deployment column (.dright). Each paints its own base background;
         the divider is .dright's border-left. Stacks on mobile. */
      .dbody {
        @apply mx-auto flex min-h-0 w-full max-w-5xl flex-1;
      }

      .dleft {
        @apply flex min-h-0 min-w-0 flex-1 flex-col overflow-y-auto bg-base px-[18px] py-4
          [scrollbar-gutter:stable];
      }

      .dright {
        @apply min-h-0 w-[360px] min-w-0 shrink-0 overflow-y-auto border-l border-divider bg-base px-[18px] py-4
          [scrollbar-gutter:stable];
      }

      .sect {
        @apply mb-[13px] flex text-[10.5px] uppercase tracking-[0.6px] opacity-55;
      }

      .sect .count {
        @apply ml-auto font-semibold opacity-80;
      }

      /* ===== Live orders list ===== */
      .olist {
        @apply shrink-0;
      }

      /* Mobile (<=760px): the whole app scrolls and the columns stack with the
         deployment panel on top. @apply cannot emit media queries in the Play
         CDN, so these responsive overrides stay as raw CSS. */
      @media (max-width: 760px) {
        .app {
          overflow-y: auto;
        }

        .dbody {
          flex-direction: column;
          overflow: visible;
        }

        .dleft {
          overflow: visible;
        }

        .dright {
          width: auto;
          order: -1;
          overflow: visible;
          border-left: 0;
          scrollbar-gutter: auto;
        }

        /* Pizza name hidden on small screens to keep the header compact. */
        .oh .nm {
          display: none;
        }

        /* Attribution text hidden on small screens; the Temporal logo stays. */
        .top .attribution span {
          display: none;
        }
      }

      /* ===== Version badges + status chips ===== */
      .vb {
        @apply rounded-[9px] px-2 py-0.5 text-[11px] font-bold text-white;
      }

      .b-v1 {
        @apply bg-uv;
      }

      .b-v2 {
        @apply bg-green;
      }

      .b-v3 {
        @apply bg-amber;
      }

      .chip {
        @apply rounded-md px-[7px] py-0.5 text-[9.5px] font-bold;
      }

      .c-cur {
        @apply bg-[#1e2150] text-[#c7ccff];
      }

      .c-ramp {
        @apply bg-[#5a3a12] text-[#fde68a];
      }

      .c-drain {
        @apply bg-[#3f3f46] text-[#d4d4d8];
      }

      .c-inact {
        @apply bg-[#27272e] text-[#9ca3af];
      }

      /* ===== Order card + stepper ===== */
      .order {
        @apply mb-3 max-h-[600px] animate-card-in rounded-xl border-2 border-edge bg-surface p-[13px_14px]
          transition-[border-color,background-color] duration-[180ms];
      }

      .order.fail {
        @apply border-[#5b1d1d] bg-[#1a1416];
      }

      /* Hover changes only the border colour — no lift/displacement, no ring,
         no shadow. Applies to every order, Done included. */
      .order:hover {
        @apply border-[#9a9a9a];
      }

      /* Keep the red identity on hover for a failed card. */
      .order.fail:hover {
        @apply border-red;
      }

      /* Done → visible-then-collapse with no JS: full for 4s, then card-collapse
         shrinks height + bottom margin to 0 so cards below glide up. */
      .order.done {
        @apply animate-card-collapse overflow-hidden;
      }

      .oh {
        @apply mb-4 flex flex-wrap items-center gap-2 text-[12.5px];
      }

      .oh .nm {
        @apply font-normal opacity-70;
      }

      .oh .el {
        @apply ml-auto text-[10.5px] opacity-45;
      }

      /* Reserve vertical room (pb) for the absolutely-positioned labels. */
      .stepper {
        @apply relative flex justify-between pb-[26px];
      }

      /* Connector track + progress fill — pseudo-elements; the fill width is a
         calc() driven by the live --fill custom property, so these stay raw CSS. */
      .stepper::before,
      .stepper::after {
        content: "";
        position: absolute;
        top: 8.5px;
        left: 10px;
        height: 3px;
        border-radius: 2px;
      }

      .stepper::before {
        right: 10px;
        background: var(--color-line);
      }

      .stepper::after {
        width: calc((100% - 20px) * var(--fill, 0) / 100);
        background: var(--color-green);
        transition: width 0.6s ease;
      }

      .node {
        @apply relative z-[1] flex flex-none flex-col items-center;
      }

      .dot {
        @apply flex size-5 items-center justify-center rounded-full border-2 border-line bg-surface text-[10px]
          text-[#6b7280] transition-colors duration-[400ms];
      }

      .lbl {
        @apply absolute left-1/2 top-full mt-[7px] w-max max-w-[84px] -translate-x-1/2 text-center text-[9px]
          leading-[1.1] opacity-55 transition-[opacity,color] duration-[400ms];
      }

      /* Anchor the end labels inward so they never overflow the card edge. */
      .node:first-child .lbl {
        @apply left-0 translate-x-0 text-left;
      }

      .node:last-child .lbl {
        @apply left-auto right-0 translate-x-0 text-right;
      }

      .node.done .dot {
        @apply border-green bg-green text-white;
      }

      .node.cur .dot {
        @apply animate-pulse-dot border-[#facc15] bg-[#facc15] text-[#111];
      }

      /* Inner dot of the current node — pseudo-element, kept as raw CSS. */
      .node.cur .dot::after {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #111;
      }

      .node.cur .lbl {
        @apply font-bold text-[#facc15] opacity-100;
      }

      .node.err .dot {
        @apply animate-errp border-red bg-red text-white;
      }

      .node.err .lbl {
        @apply font-bold text-[#fca5a5] opacity-100;
      }

      /* Reduced motion: disable smoothing/entry; Done still collapses (snaps). */
      @media (prefers-reduced-motion: reduce) {
        .order {
          animation: none;
          transition: none;
        }

        .order.done {
          animation: card-collapse 0.01s linear 4s forwards;
        }

        .stepper::after,
        .dot,
        .lbl {
          transition: none;
        }
      }

      /* ===== Deployment panel ===== */
      .ver {
        @apply mb-[11px] rounded-[11px] border border-edge bg-surface p-3;
      }

      .ver.inactive {
        @apply opacity-55;
      }

      .vrow {
        @apply mb-[9px] flex flex-wrap items-center gap-[7px] text-[12px];
      }

      .vrow .chip {
        @apply ml-auto;
      }

      .bar {
        @apply h-[7px] overflow-hidden rounded-sm bg-line;
      }

      .bar > span {
        @apply block h-full w-[var(--bar-w,0)];
      }

      .pin {
        @apply mt-2 text-[10.5px] opacity-60;
      }

      /* ===== Buttons ===== */
      .controls {
        @apply mt-4 flex gap-2;
      }

      .controls .btn {
        @apply mt-0 flex-1;
      }

      .ramp-row {
        @apply flex gap-2;
      }

      .ramp-row .btn {
        @apply flex-1;
      }

      .btn {
        @apply mt-[9px] cursor-pointer rounded-[9px] border border-line bg-raised p-[9px] text-center
          text-[11.5px] font-sans font-semibold text-ink;
      }

      .btn:hover:not(:disabled) {
        @apply bg-[#26262e];
      }

      .btn:disabled {
        @apply cursor-not-allowed opacity-45;
      }

      .btn.active {
        @apply border-amber text-[#fde68a];
      }

      .btn.danger {
        @apply border-[#7f1d1d] bg-[#7f1d1d] text-white;
      }

      .btn.danger:hover:not(:disabled) {
        @apply bg-[#991b1b];
      }

      .btn.primary {
        @apply border-uv bg-uv text-white;
      }

      .btn.primary:hover:not(:disabled) {
        @apply bg-uv-deep;
      }

      /* ===== Toast ===== */
      .toast {
        @apply pointer-events-none fixed bottom-[18px] left-1/2 z-10 -translate-x-1/2 rounded-[9px]
          border border-[#7f1d1d] bg-[#3f1212] px-4 py-2.5 text-[12px] font-semibold text-[#fca5a5] opacity-0;
      }

      /* Swapped in as <div class="toast show">…</div>; fades out after ~4s, no JS. */
      .toast.show {
        @apply animate-toast-out opacity-100;
      }

      /* ===== Deploy modal ===== */
      .modal-scrim {
        @apply fixed inset-0 z-50 flex items-center justify-center bg-black/60;
      }

      .modal {
        @apply w-[360px] rounded-2xl border border-line bg-surface p-7;
      }

      .modal h3 {
        @apply m-0 mb-2 text-lg font-extrabold;
      }

      .modal-note {
        @apply mt-5 text-xs leading-relaxed text-[#9aa];
      }

      .modal-lbl {
        @apply mt-5 mb-2 flex justify-between text-xs uppercase tracking-wider text-[#8a8a99];
      }

      .radios {
        @apply flex gap-2.5;
      }

      .radio {
        @apply flex-1 cursor-pointer rounded-lg border border-line bg-raised py-2.5 text-center transition-colors;
      }

      .radio:has(input:checked) {
        @apply border-uv bg-[#1d2046];
      }

      .radio:not(:has(input:checked)):hover {
        @apply border-[#3f3f4d] bg-[#22222c];
      }

      .radio input {
        @apply hidden;
      }

      /* Modal range input: 4 reachable stops (10/25/50/100) via min=0 max=3. */
      .stepper-range {
        @apply block w-full accent-amber;
      }

      .modal-acts {
        @apply mt-5 flex gap-2.5;
      }

      .modal-acts .btn {
        @apply flex-1;
      }
    </style>
  </head>

  <body hx-ext="sse,response-targets,morph">
    <div class="app" sse-connect="/events">
      <header class="top">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"
               xmlns="http://www.w3.org/2000/svg">
            <g fill="#e8923a" stroke="#f4c542" stroke-width="1.4" stroke-linejoin="round">
              <path d="M12 12L20.5 12A8.5 8.5 0 1 1 12 3.5Z" />
              <path d="M14.4 9.6L14.4 1.1A8.5 8.5 0 0 1 22.9 9.6Z" />
            </g>
            <g fill="#c0392b">
              <circle cx="15.5" cy="15.5" r="1.05" />
              <circle cx="8.5" cy="15.5" r="1.05" />
              <circle cx="8.5" cy="8.5" r="1.05" />
              <circle cx="11" cy="13.5" r="1.05" />
              <circle cx="16.8" cy="7.2" r="1.05" />
              <circle cx="15" cy="9.3" r="1.05" />
            </g>
          </svg>
          <span>Pizza Tracker</span>
        </div>
        <div class="attribution">
          <span>Workflow Versioning by</span>
          <img src="https://images.ctfassets.net/0uuz8ydxyd9p/2ctnUPEhKA75tYnrl2Kzvj/90563965bc4ea2af9442b6eb4ba43180/Temporal_LogoLockup_Horizontal_light_1_2x.png"
               alt="Temporal" />
        </div>
      </header>

      <div class="dbody">
        <section class="dleft">
          <div class="sect">Live orders</div>
          <div class="olist" id="orders" sse-swap="orders" hx-swap="morph:innerHTML"></div>
        </section>

        <aside class="dright">
          <div class="sect">Deployment</div>
          <div id="versions" sse-swap="versions"></div>

          <!-- Controls row, streamed server-side via SSE (sse-swap="controls")
               and morphed in place like #orders, so button nodes, htmx bindings
               and focus are preserved. The server re-renders all three buttons
               every frame; Rollback carries the disabled attribute unless a
               version is currently ramping. -->
          <div class="controls" id="controls" sse-swap="controls" hx-swap="morph:innerHTML"></div>
        </aside>
      </div>
    </div>

    <!-- Single modal host. A modal is open when the server has swapped a
         .modal-scrim fragment in here, closed when it is emptied — no JS, no
         hidden toggling. Deploy/Rollback (in the controls row) GET their modal
         fragment into this host; Cancel and Escape GET /api/close to clear it.
         The Deploy form posts /api/deploy and the server decides promote vs
         ramp; success returns an empty 200 that clears the host (closing the
         modal), while errors route to #toast (response-targets) so the modal
         stays open. The host sits outside every sse-swap region, so SSE frames
         never touch it. -->
    <div id="modal-host"></div>

    <!-- Action results and errors are swapped here as toast fragments. The
         Deploy/Rollback/Recover buttons live in the Deployment column controls
         row; all surface error responses here via #toast. -->
    <div id="toast" hx-target="#toast" hx-target-error="#toast"></div>
  </body>
</html>
