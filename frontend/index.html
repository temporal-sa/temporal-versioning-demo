<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza Tracker</title>

    <!-- Inline pizza-slice favicon (same artwork as the header logo) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Cg%20fill=%22%23e8923a%22%20stroke=%22%23f4c542%22%20stroke-width=%221.4%22%20stroke-linejoin=%22round%22%3E%3Cpath%20d=%22M12%2012L20.5%2012A8.5%208.5%200%201%201%2012%203.5Z%22/%3E%3Cpath%20d=%22M14.4%209.6L14.4%201.1A8.5%208.5%200%200%201%2022.9%209.6Z%22/%3E%3C/g%3E%3Cg%20fill=%22%23c0392b%22%3E%3Ccircle%20cx=%2215.5%22%20cy=%2215.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%228.5%22%20cy=%2215.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%228.5%22%20cy=%228.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%2211%22%20cy=%2213.5%22%20r=%221.05%22/%3E%3Ccircle%20cx=%2216.8%22%20cy=%227.2%22%20r=%221.05%22/%3E%3Ccircle%20cx=%2215%22%20cy=%229.3%22%20r=%221.05%22/%3E%3C/g%3E%3C/svg%3E"
    />

    <!-- Tailwind CSS v4 (Play CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- HTMX core + SSE and response-targets extensions (current stable 2.x) -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-response-targets@2"></script>
    <!-- Idiomorph htmx extension (pre-1.0 → floating @0); registers the "morph" swap. -->
    <script src="https://cdn.jsdelivr.net/npm/idiomorph@0/dist/idiomorph-ext.min.js"></script>

    <!--
      Styling ported 1:1 from the locked app.css design. Plain utilities are
      applied via @apply on semantic component classes (templates stay dumb and
      reuse the same class names the Go html/template emits). Things that cannot
      be expressed as utilities — color/animation theme tokens, @keyframes, the
      scrollbar, and the toast fade-out — live as raw CSS in this single block.
    -->
    <style type="text/tailwindcss">
      @theme {
        /* Exact hex values from app.css; exposed as color tokens so both
           utilities and var(--color-*) references resolve. */
        --color-blue: #2563eb; /* v1 */
        --color-green: #16a34a; /* v2 */
        --color-amber: #d97706; /* v3 */
        --color-red: #dc2626;

        /* Animations (names map to --animate-* tokens). */
        --animate-pulse-dot: pulse 1.5s ease-out infinite;
        --animate-errp: errp 1.2s infinite;

        @keyframes pulse {
          0% {
            box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.55);
          }
          70% {
            box-shadow: 0 0 0 10px rgba(250, 204, 21, 0);
          }
          100% {
            box-shadow: 0 0 0 0 rgba(250, 204, 21, 0);
          }
        }

        @keyframes errp {
          0% {
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6);
          }
          70% {
            box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);
          }
          100% {
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
          }
        }

        @keyframes toast-out {
          0%,
          90% {
            opacity: 1;
          }
          100% {
            opacity: 0;
          }
        }

        /* New order card entry: morphed (persisted) cards keep their node and do
           not replay this; only a genuinely new DOM node runs it once. */
        @keyframes card-in {
          from {
            opacity: 0;
            transform: translateY(6px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e7e7ee;
        background: #0e0e13;
      }

      /* ===== App shell ===== */
      .app {
        @apply flex flex-col overflow-hidden;
        height: 100dvh;
      }

      .top {
        @apply flex shrink-0 items-center gap-3 px-[18px] py-[15px];
        background: #15151d;
        border-bottom: 1px solid #23232c;
      }

      .top .logo {
        @apply flex items-center gap-2 text-[17px] font-extrabold;
      }

      .top .logo .logo-icon {
        @apply shrink-0;
      }

      /* ===== KPI strip ===== */
      .kpis {
        @apply flex shrink-0 gap-px;
        background: #23232c;
        border-bottom: 1px solid #23232c;
      }

      .kpi {
        @apply flex-1 px-4 py-[11px];
        background: #0e0e13;
      }

      .kpi .l {
        @apply text-[9px] uppercase opacity-50;
        letter-spacing: 0.5px;
      }

      .kpi .v {
        @apply mt-[3px] text-[17px] font-bold;
      }

      .kpi .v small {
        @apply text-[11px] opacity-60;
      }

      /* ===== Body: two columns on desktop ===== */
      .dbody {
        @apply flex min-h-0 flex-1 max-[760px]:flex-col;
      }

      .dleft {
        @apply flex flex-1 min-w-0 flex-col overflow-y-auto px-[18px] py-4 max-[760px]:flex-none max-[760px]:overflow-visible max-[760px]:border-r-0;
        border-right: 1px solid #23232c;
        /* Always reserve the scrollbar gutter so the masonry columns don't shift
           left when the scrollbar toggles as orders are added/removed. Inert on
           mobile, where .dleft is overflow-visible (no internal scroll region). */
        scrollbar-gutter: stable;
      }

      .dright {
        /* Pinned to exactly one third so its left edge aligns with the 3rd KPI
           cell ("Ramping"); the mobile max-[760px]:flex-none below resets this
           when the layout stacks into a single column. */
        @apply min-w-0 basis-1/3 grow-0 shrink-0 overflow-y-auto px-[18px] py-4 max-[760px]:flex-none max-[760px]:overflow-visible;
        /* Always reserve the scrollbar gutter so the column doesn't shift when
           the scrollbar toggles. */
        scrollbar-gutter: stable;
      }

      .sect {
        @apply mb-[13px] flex text-[10.5px] uppercase opacity-55;
        letter-spacing: 0.6px;
      }

      .sect .count {
        @apply ml-auto font-semibold;
        opacity: 0.8;
      }

      /* ===== Live orders list ===== */
      .olist {
        /* Positioning context for the absolutely-placed cards laid out by the
           masonry script. Height is set inline by that script; scrolling is
           delegated to the .dleft column (already overflow-y-auto). */
        @apply relative;
      }

      @media (max-width: 760px) {
        /* On mobile the whole app scrolls; the orders list is not an internal
           scroll region. */
        .app {
          overflow-y: auto;
        }

        .dbody {
          overflow: visible;
        }

        .dright {
          /* overflow-visible on mobile, so the reserved gutter is pointless. */
          scrollbar-gutter: auto;
        }

        /* Pizza name is hidden on small screens to keep the header compact. */
        .oh .nm {
          display: none;
        }
      }

      /* ===== Version badges + status chips ===== */
      .vb {
        @apply rounded-[9px] px-2 py-0.5 text-[11px] font-bold text-white;
      }

      .b-v1 {
        background: var(--color-blue);
      }

      .b-v2 {
        background: var(--color-green);
      }

      .b-v3 {
        background: var(--color-amber);
      }

      .chip {
        @apply rounded-md px-[7px] py-0.5 text-[9.5px] font-bold;
      }

      .c-cur {
        background: #0c4a6e;
        color: #bae6fd;
      }

      .c-ramp {
        background: #5a3a12;
        color: #fde68a;
      }

      .c-drain {
        background: #3f3f46;
        color: #d4d4d8;
      }

      .c-inact {
        background: #27272e;
        color: #9ca3af;
      }

      /* ===== Order card + stepper ===== */
      .order {
        @apply rounded-xl p-[13px_14px];
        background: #15151d;
        border: 1px solid #20202a;
        /* The masonry script places cards absolutely within the relative #orders;
           left/top/width are set inline per layout pass. */
        position: absolute;
        left: 0;
        top: 0;
        box-sizing: border-box;
        /* Generous cap so .order.done can transition max-height to 0 (real cards
           are far shorter, so this never clips a live card). */
        max-height: 600px;
        /* card-in animates transform (translateY), which the script never sets —
           the script positions via left/top — so the two never conflict. */
        animation: card-in 0.35s ease backwards;
        /* Glide to new positions (left/top/width) and the Done collapse
           (max-height/opacity/filter). */
        transition:
          left 0.45s ease,
          top 0.45s ease,
          width 0.45s ease,
          max-height 0.5s ease,
          opacity 0.5s ease,
          filter 0.4s ease;
      }

      .order.fail {
        border-color: #5b1d1d;
        background: #1a1416;
      }

      /* Collapse: pure vertical collapse (grey + dim + height → 0). A Done card
         keeps its normal full appearance (the all-green stepper is the cue)
         until the masonry script flags it data-collapsing, COLLAPSE_DELAY after
         it became Done. The script then treats its height as 0, so cards below
         it in the same column glide up to reuse the freed space. */
      .order[data-collapsing] {
        overflow: hidden; /* clip own content while the height collapses */
        max-height: 0;
        opacity: 0;
        filter: grayscale(1);
        padding-top: 0;
        padding-bottom: 0;
        border-width: 0;
      }

      .oh {
        @apply mb-4 flex flex-wrap items-center gap-2 text-[12.5px];
      }

      .oh .nm {
        @apply font-normal opacity-70;
      }

      .oh .el {
        @apply ml-auto text-[10.5px];
        opacity: 0.45;
      }

      .retry {
        @apply rounded-md px-[7px] py-px text-[10px] font-bold;
        color: #fca5a5;
        background: #3f1212;
      }

      .stepper {
        @apply relative flex justify-between;
        /* Reserve vertical room for the absolutely-positioned labels below the dots
           (dot 20px + gap + up to two 9px lines). */
        padding-bottom: 26px;
      }

      /* Continuous connector track + progress fill, drawn behind the dots and
         spanning from the centre of the first dot to the centre of the last dot
         (dot radius = 10px). The green fill length is driven by --fill (0–100). */
      .stepper::before,
      .stepper::after {
        content: "";
        position: absolute;
        top: 8.5px; /* dot is 20px (size-5) tall → centre at 10px, line is 3px */
        left: 10px;
        height: 3px;
        border-radius: 2px;
      }

      .stepper::before {
        right: 10px;
        background: #2c2c38;
      }

      .stepper::after {
        width: calc((100% - 20px) * var(--fill, 0) / 100);
        background: var(--color-green);
        /* Slide the fill when --fill changes on a morphed (persisted) node. */
        transition: width 0.6s ease;
      }

      .node {
        /* Width collapses to the dot (the label is taken out of flow) so the dots
           distribute edge-to-edge; z-index lifts them above the track. */
        @apply relative z-[1] flex flex-none flex-col items-center;
      }

      .dot {
        @apply flex size-5 items-center justify-center rounded-full text-[10px];
        background: #15151d;
        border: 2px solid #2c2c38;
        color: #6b7280;
        /* Animate state changes as the node class flips ""/cur/done/err. */
        transition:
          background-color 0.4s ease,
          border-color 0.4s ease,
          color 0.4s ease;
      }

      .lbl {
        @apply absolute left-1/2 top-full mt-[7px] -translate-x-1/2 text-center text-[9px] opacity-55;
        width: max-content;
        max-width: 84px;
        line-height: 1.1;
        transition:
          opacity 0.4s ease,
          color 0.4s ease;
      }

      /* Anchor the end labels inward so they never overflow the card edge. */
      .node:first-child .lbl {
        @apply left-0 translate-x-0 text-left;
      }

      .node:last-child .lbl {
        @apply left-auto right-0 translate-x-0 text-right;
      }

      .node.done .dot {
        background: var(--color-green);
        border-color: var(--color-green);
        color: #fff;
      }

      .node.cur .dot {
        background: #facc15;
        border-color: #facc15;
        color: #111;
        animation: var(--animate-pulse-dot);
      }

      .node.cur .dot::after {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #111;
      }

      .node.cur .lbl {
        opacity: 1;
        color: #facc15;
        font-weight: 700;
      }

      .node.err .dot {
        background: var(--color-red);
        border-color: var(--color-red);
        color: #fff;
        animation: var(--animate-errp);
      }

      .node.err .lbl {
        opacity: 1;
        color: #fca5a5;
        font-weight: 700;
      }

      /* Disable the smoothing/entry motion added above for reduced-motion users. */
      @media (prefers-reduced-motion: reduce) {
        /* Instant positioning and instant collapse: no glide, no animated height. */
        .order {
          animation: none;
          transition: none;
        }

        .stepper::after,
        .dot,
        .lbl {
          transition: none;
        }
      }

      /* ===== Deployment panel ===== */
      .ver {
        @apply mb-[11px] rounded-[11px] p-3;
        background: #15151d;
        border: 1px solid #20202a;
      }

      .ver.inactive {
        opacity: 0.55;
      }

      .vrow {
        @apply mb-[9px] flex flex-wrap items-center gap-[7px] text-[12px];
      }

      .vrow .chip {
        @apply ml-auto;
      }

      .bar {
        @apply h-[7px] overflow-hidden rounded-sm;
        background: #2c2c38;
      }

      .bar > span {
        @apply block h-full;
        width: var(--bar-w, 0);
      }

      .pin {
        @apply mt-2 text-[10.5px] opacity-60;
      }

      .pin.warn {
        color: #fca5a5;
        opacity: 1;
      }

      /* ===== Buttons ===== */
      .controls {
        @apply mt-4;
      }

      .ramp-row {
        @apply flex gap-2;
      }

      .ramp-row .btn {
        @apply flex-1;
      }

      .btn {
        @apply mt-[9px] cursor-pointer rounded-[9px] p-[9px] text-center text-[11.5px] font-semibold;
        border: 1px solid #2c2c38;
        background: #1b1b24;
        color: #e7e7ee;
        font-family: inherit;
      }

      .btn:hover:not(:disabled) {
        background: #23232f;
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn.active {
        border-color: var(--color-amber);
        color: #fde68a;
      }

      .btn.danger {
        background: #7f1d1d;
        border-color: #7f1d1d;
        color: #fff;
      }

      .btn.danger:hover:not(:disabled) {
        background: #991b1b;
      }

      /* ===== Toast ===== */
      .toast {
        @apply fixed bottom-[18px] left-1/2 z-10 -translate-x-1/2 rounded-[9px] px-4 py-2.5 text-[12px] font-semibold;
        background: #3f1212;
        color: #fca5a5;
        border: 1px solid #7f1d1d;
        pointer-events: none;
        opacity: 0;
      }

      /* The server swaps in <div class="toast show">…</div>; the animation
         fades it out after ~4s with no JavaScript. */
      .toast.show {
        opacity: 1;
        animation: toast-out 4s ease forwards;
      }
    </style>
  </head>

  <body hx-ext="sse,response-targets,morph">
    <div class="app" sse-connect="/events">
      <header class="top">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"
               xmlns="http://www.w3.org/2000/svg">
            <g fill="#e8923a" stroke="#f4c542" stroke-width="1.4" stroke-linejoin="round">
              <path d="M12 12L20.5 12A8.5 8.5 0 1 1 12 3.5Z" />
              <path d="M14.4 9.6L14.4 1.1A8.5 8.5 0 0 1 22.9 9.6Z" />
            </g>
            <g fill="#c0392b">
              <circle cx="15.5" cy="15.5" r="1.05" />
              <circle cx="8.5" cy="15.5" r="1.05" />
              <circle cx="8.5" cy="8.5" r="1.05" />
              <circle cx="11" cy="13.5" r="1.05" />
              <circle cx="16.8" cy="7.2" r="1.05" />
              <circle cx="15" cy="9.3" r="1.05" />
            </g>
          </svg>
          <span>Pizza Tracker</span>
        </div>
      </header>

      <div class="kpis" id="kpis" sse-swap="kpis">
        <div class="kpi">
          <div class="l">In flight</div>
          <div class="v">—</div>
        </div>
        <div class="kpi">
          <div class="l">Current</div>
          <div class="v">—</div>
        </div>
        <div class="kpi">
          <div class="l">Ramping</div>
          <div class="v">—</div>
        </div>
      </div>

      <div class="dbody">
        <section class="dleft">
          <div class="sect">Live orders</div>
          <div class="olist" id="orders" sse-swap="orders" hx-swap="morph:innerHTML"></div>
        </section>

        <aside class="dright">
          <div class="sect">Deployment</div>
          <div id="versions" sse-swap="versions"></div>

          <div class="controls" id="controls" sse-swap="controls">
            <div class="ramp-row">
              <button class="btn">10%</button>
              <button class="btn">25%</button>
              <button class="btn">50%</button>
              <button class="btn">100%</button>
            </div>
            <button class="btn">Promote</button>
            <button class="btn danger">⟲ Rollback</button>
            <button class="btn">Recover stuck orders</button>
          </div>
        </aside>
      </div>
    </div>

    <!-- Action results and errors are swapped here as toast fragments. The
         POST buttons live in #controls; their error responses target #toast
         via the response-targets extension. -->
    <div id="toast" hx-target="#toast" hx-target-error="#toast"></div>

    <!-- Client-side masonry layout for the live order cards.

         The server keeps morphing a flat, oldest-first list of .order cards into
         #orders (SSE + idiomorph) untouched. This script does NOT move nodes or
         touch the data pipeline — it only positions the existing cards into
         independent columns:

           - Each card is pinned to a column (dataset.col) for its lifetime, so it
             never jumps columns when others arrive or leave.
           - A new card fills the bottom of the shortest column.
           - A done card is treated as zero-height, so cards below it in the same
             column glide up (CSS transitions on left/top/width handle the glide).
           - The column count adapts to width; a width change forces a re-pack. -->
    <script>
      (function () {
        "use strict";

        var MIN_COL = 360; // minimum usable column width in px
        var MAX_COLS = 2; // cap matches the dashboard's 2-column intent
        var GAP = 12; // px gutter between columns/cards (matches gap-3)
        var COLLAPSE_DELAY = 4000; // ms a Done card stays visible before it collapses

        var orders = document.getElementById("orders");
        if (!orders) {
          return; // defensive no-op if the target is absent
        }

        // idiomorph syncs attributes on each morph and would strip the inline style
        // (top/left/width) the masonry layout sets — the server-rendered cards have no
        // style attribute — causing the cards to flash back to 0,0 every SSE tick.
        // Tell idiomorph to leave .order's style and data-* attributes alone; the
        // script owns them.
        if (typeof Idiomorph !== "undefined") {
          Idiomorph.defaults.callbacks = Idiomorph.defaults.callbacks || {};
          var prevBeforeAttr = Idiomorph.defaults.callbacks.beforeAttributeUpdated;
          Idiomorph.defaults.callbacks.beforeAttributeUpdated = function (attr, node, mutationType) {
            if (
              (attr === "style" || attr.indexOf("data-") === 0) &&
              node.nodeType === 1 &&
              node.classList &&
              node.classList.contains("order")
            ) {
              return false; // skip — the script owns the card's style and data-* attributes (inline position, column pin, collapse state)
            }
            if (typeof prevBeforeAttr === "function") {
              return prevBeforeAttr(attr, node, mutationType);
            }
          };
        }

        var lastColumnCount = 0;
        var frame = 0;

        function layout() {
          var width = orders.clientWidth;
          if (width <= 0) {
            return; // not laid out / hidden yet
          }

          var count = Math.max(
            1,
            Math.min(MAX_COLS, Math.floor((width + GAP) / (MIN_COL + GAP)))
          );
          var colWidth = (width - (count - 1) * GAP) / count;

          // A change in column count invalidates every pin: re-pack from scratch.
          if (count !== lastColumnCount) {
            var i;
            var all = orders.children;
            for (i = 0; i < all.length; i++) {
              delete all[i].dataset.col;
            }
            lastColumnCount = count;
          }

          // Running pixel height of each column, used both to place cards and to
          // pick the shortest column for newcomers.
          var colHeights = new Array(count).fill(0);

          var cards = orders.children;
          for (var c = 0; c < cards.length; c++) {
            var card = cards[c];

            // Pin to a column: keep a valid existing assignment, otherwise drop
            // the new card into the currently shortest column.
            var col = parseInt(card.dataset.col, 10);
            if (isNaN(col) || col >= count) {
              col = shortestColumn(colHeights);
              card.dataset.col = String(col);
            }

            // A freshly morphed-in card has no inline top yet (CSS defaults to
            // top:0; left:0), so its first placement would otherwise glide in
            // from the corner via the .order left/top transition. Suppress the
            // transition for this first placement only; later moves still
            // animate, and the card-in entry animation (transform) is untouched.
            var isFirstPlacement = !card.style.top;
            if (isFirstPlacement) {
              card.style.transition = "none";
            }
            card.style.width = colWidth + "px";
            card.style.left = col * (colWidth + GAP) + "px";
            card.style.top = colHeights[col] + "px";
            if (isFirstPlacement) {
              // Force a reflow so the no-transition placement is committed, then
              // restore the stylesheet transition so future moves animate.
              void card.offsetWidth;
              card.style.transition = "";
            }

            // A Done card stays full-height (all-green stepper) for COLLAPSE_DELAY,
            // then a one-shot timer flags it data-collapsing — only then does it
            // collapse to zero and let the cards below it glide up to reuse the space.
            if (card.classList.contains("done") && !card.dataset.doneSeen) {
              card.dataset.doneSeen = "1";
              var leaving = card;
              setTimeout(function () {
                leaving.dataset.collapsing = "1";
                scheduleLayout();
              }, COLLAPSE_DELAY);
            }

            var height = card.dataset.collapsing ? 0 : card.offsetHeight;
            if (height > 0) {
              colHeights[col] += height + GAP;
            }
          }

          // Size the positioning context to the tallest column so .dleft scrolls.
          orders.style.height = Math.max(0, Math.max.apply(null, colHeights)) + "px";
        }

        function shortestColumn(colHeights) {
          var best = 0;
          for (var i = 1; i < colHeights.length; i++) {
            if (colHeights[i] < colHeights[best]) {
              best = i;
            }
          }
          return best;
        }

        // rAF-debounced wrapper: coalesce bursts and guard against re-entrancy.
        function scheduleLayout() {
          if (frame) {
            return;
          }
          frame = requestAnimationFrame(function () {
            frame = 0;
            layout();
          });
        }

        // Relayout after each SSE morph into #orders.
        document.body.addEventListener("htmx:afterSettle", function (e) {
          if (
            e.target.id === "orders" ||
            (e.target.closest && e.target.closest("#orders"))
          ) {
            scheduleLayout();
          }
        });

        // Responsive: window resize and panel reflow.
        // Observe .dleft (the column whose width tracks the viewport), NOT #orders:
        // the script sets #orders' height every layout, which would otherwise re-fire
        // the observer on its own writes.
        var resizeTarget = orders.closest(".dleft") || orders;
        new ResizeObserver(scheduleLayout).observe(resizeTarget);

        // rAF is paused in background tabs, so cards that morph in while
        // backgrounded never get positioned. Relayout when the tab is shown.
        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) {
            scheduleLayout();
          }
        });

        // Initial layout, and once more after htmx settles the shell.
        document.addEventListener("DOMContentLoaded", layout);
        document.body.addEventListener("htmx:afterSettle", scheduleLayout, { once: true });
      })();
    </script>
  </body>
</html>
