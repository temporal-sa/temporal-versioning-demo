version: "2"
linters:
  default: standard
  enable:
    - revive
    - gosec
    - bodyclose
    - errorlint
    - gocritic
  settings:
    revive:
      rules:
        # PizzaOrderV1/V2/V3 deliberately echo the "PizzaOrder" workflow type
        # name they register under, so the package-qualified stutter is intended.
        - name: exported
          arguments:
            - disableStutteringCheck
formatters:
  enable:
    - gofumpt
    - goimports
