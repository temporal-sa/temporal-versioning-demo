root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/backend ./cmd/backend"
  bin = "./tmp/backend"
  include_ext = ["go", "html", "tmpl"]
  exclude_dir = ["bin", "tmp", "vendor", "testdata", ".git", "k8s", ".superpowers"]
  delay = 200
  kill_delay = "500ms"
  send_interrupt = true

[log]
  main_only = false

# Live-reload proxy: serves the dashboard on :8090, injects a reload script into
# HTML responses, and refreshes the browser after each successful rebuild. It
# forwards to the app on :8080; SSE (text/event-stream) responses pass through.
[proxy]
  enabled = true
  proxy_port = 8090
  app_port = 8080
