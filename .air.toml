root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/backend ./cmd/backend"
  bin = "./tmp/backend"
  include_ext = ["go", "html", "css", "js"]
  exclude_dir = ["bin", "tmp", "vendor", "testdata", ".git", "k8s", ".superpowers"]
  delay = 200
  kill_delay = "500ms"
  send_interrupt = true

[log]
  main_only = false
